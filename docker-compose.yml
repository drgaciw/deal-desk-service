version: '3.8'

services:
  deal-core:
    build:
      context: .
      dockerfile: k8s/deal-core/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JAVA_OPTS=-XX:+UseG1GC -XX:MaxRAMPercentage=75.0
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - postgres
      - mongodb

  rules-runtime:
    build:
      context: .
      dockerfile: k8s/rules-runtime/Dockerfile
    ports:
      - "8081:8080"
      - "9090:9090"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JAVA_OPTS=-XX:+UseShenandoahGC -XX:MaxRAMPercentage=75.0
    volumes:
      - ./config:/app/config
      - rules-cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - deal-core
      - postgres

  tcv-processors:
    build:
      context: .
      dockerfile: k8s/tcv-processors/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JAVA_OPTS=-XX:+UseParallelGC -XX:MaxRAMPercentage=50.0
    volumes:
      - ./config:/app/config
      - batch-workspace:/app/batch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - deal-core
      - rules-runtime
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=dealdesk
      - POSTGRES_USER=dealdesk
      - POSTGRES_PASSWORD=dealdesk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: dealdesk-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-dealdesk}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-}
      MONGO_INITDB_DATABASE: dealdb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - dealdesk-network
networks:
  dealdesk-network:
    name: dealdesk-network
    external: true

volumes:
  postgres-data:
  rules-cache:
  batch-workspace:
  mongodb_data:
    driver: local