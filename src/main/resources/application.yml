spring:
  application:
    name: deal-desk-service
  
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/dealdesk}
      database: dealdesk
      auto-index-creation: true
  
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://localhost:8080/auth/realms/dealdesk}
  
  cache:
    type: caffeine
    cache-names:
      - rulesCache
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  packages-to-scan: com.aciworldwide.dealdesk
  show-actuator: true

resilience4j:
  circuitbreaker:
    instances:
      salesforce:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 50s
        failureRateThreshold: 50
  ratelimiter:
    instances:
      default:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 2s

logging:
  level:
    root: INFO
    com.aciworldwide.dealdesk: DEBUG
    '[org.springframework.web]': INFO
    '[org.springframework.security]': INFO
    '[org.springframework.data.mongodb]': INFO
    org.springframework.cache: INFO

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: never
    include-binding-errors: never

rules:
  engine:
    versioning:
      enabled: true
      keep-versions: 5
  audit:
    enabled: true
    retention-days: 30
    batch-size: 100
  validation:
    expression-timeout-ms: 5000
    max-condition-length: 2000
    max-action-length: 2000
    allowed-packages:
      - java.math
      - java.time
      - java.util
      - com.aciworldwide.dealdesk.model

# Salesforce configuration
salesforce:
  client-id: ${SALESFORCE_CLIENT_ID:test-client-id}
  client-secret: ${SALESFORCE_CLIENT_SECRET:test-client-secret}
  security-token: ${SALESFORCE_SECURITY_TOKEN:test-security-token}
  password: ${SALESFORCE_PASSWORD:test-password}
  username: ${SALESFORCE_USERNAME:test-username}
  base-url: ${SALESFORCE_BASE_URL:https://test.salesforce.com}
  opportunity-pricebook-id: ${SALESFORCE_OPPORTUNITY_PRICEBOOK_ID:test-pricebook-id}