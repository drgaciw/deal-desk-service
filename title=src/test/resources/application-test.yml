# Global application configuration for Deal Desk Service

spring:
  application:
    name: deal-desk-service
  
  # MongoDB configuration using a URI (with environment variable fallbacks)
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://${MONGO_USERNAME:dealdesk}:${MONGO_PASSWORD}@localhost:27017/dealdesk?authSource=admin&tls=false}
      database: dealdesk
      auto-index-creation: true
  
  # Security configuration: OAuth2 Resource Server (JWT)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://localhost:8080/auth/realms/dealdesk}
  
  # Cache configuration using Caffeine
  cache:
    type: caffeine
    cache-names:
      - rulesCache
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m

# Management, actuator, and metrics configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true

# API documentation configuration using springdoc-openapi
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  packages-to-scan: com.aciworldwide.dealdesk
  show-actuator: true

# Resilience4j configuration for fault tolerance
resilience4j:
  circuitbreaker:
    instances:
      salesforce:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 50s
        failureRateThreshold: 50
  ratelimiter:
    instances:
      default:
        limitForPeriod: 100
        limitRefreshPeriod: 1s
        timeoutDuration: 2s

# Logging configuration levels
logging:
  level:
    root: INFO
    com.aciworldwide.dealdesk: DEBUG
    "org.springframework.web": INFO
    "org.springframework.security": INFO
    "org.springframework.data.mongodb": INFO
    org.springframework.cache: INFO

# Embedded server configuration
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# Rules engine properties configuration (for RuleEngineProperties)
rules:
  engine:
    versioning:
      enabled: true
      keep-versions: 5
  
  audit:
    enabled: true
    retention-days: 30
    batch-size: 100
    include-input-data: true
    include-output-data: true
    async-processing: true
  
  execution:
    timeout-seconds: 30
    max-rules-per-category: 100
    parallel-execution: false
    thread-pool:
      core-size: 4
      max-size: 8
      queue-capacity: 100
  
  validation:
    expression-timeout-ms: 5000
    max-condition-length: 2000
    max-action-length: 2000
    allowed-packages:
      - java.math
      - java.time
      - java.util
      - com.aciworldwide.dealdesk.model
      - com.aciworldwide.dealdesk.rules.model
    syntax-validation: true
    circular-dependency-check: true
    max-rule-chain-depth: 10
  
  monitoring:
    metrics-enabled: true
    trace-enabled: true
    alert-threshold-ms: 1000
    error-threshold-percent: 5
    performance:
      collect-execution-times: true
      slow-rule-threshold-ms: 500
    health:
      enabled: true
      include-rule-stats: true

# Salesforce test stub configuration
salesforce:
  client-id: test-client-id
  client-secret: test-client-secret
  security-token: test-security-token
  password: test-password
  username: test-username
  auth-url: https://test.salesforce.com/services/oauth2/token
  api-version: v55.0
  instance-url: https://test.salesforce.com
  base-url: https://test.salesforce.com
  opportunity-pricebook-id: test-pricebook-id

# Cache TTL for testing purposes
cache:
  rules:
    ttl: 3600  # Cache Time-To-Live in seconds for tests 